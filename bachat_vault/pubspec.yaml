name: bachat_vault
description: "Smart Investment Guide."
publish_to: 'none' 

version: 1.0.1+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  google_fonts: ^8.0.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Added these two for Phase 3!
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/
    - assets/logos/

# --- APP ICON CONFIGURATION ---
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon_adaptive.png"
  min_sdk_android: 21

# --- SPLASH SCREEN CONFIGURATION ---
flutter_native_splash:
  color: "#0F172A"
  image: "assets/app_logo.png"
  android_12:
    image: "assets/app_logo.png"
    icon_background_color: "#0F172A"
    color: "#0F172A"