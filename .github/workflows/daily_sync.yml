on:
  schedule:
    # 1. 2-Hourly Funds (MUFAP/UBL) - Runs every 2 hours
    - cron: '0 */2 * * *' 
    
    # 2. Market Data - 8 AM and 5 PM PST (03:00 & 12:00 UTC)
    - cron: '0 3,12 * * *'

  workflow_dispatch: 

jobs:
  sync_and_calculate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run 2-Hourly Fund Sync
        if: github.event.schedule == '0 */2 * * *'
        run: python scraper_main.py --mode funds

      - name: Run Twice-Daily Market Sync
        if: github.event.schedule == '0 3,12 * * *'
        run: python scraper_main.py --mode market

      - name: Run Manual Full Sync
        if: github.event_name == 'workflow_dispatch'
        run: python scraper_main.py --mode full

      - name: Run Brain Engine
        run: python brain.py