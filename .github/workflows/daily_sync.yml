name: Bachat Vault Master Sync

on:
  schedule:
    # Runs at 5:14 AM, 5:14 PM, 7:14 PM, and 9:14 PM PKT (UTC+5)
    - cron: '14 0,12,14,16 * * *' 
  workflow_dispatch:
    # THIS IS NEW: Adds a dropdown menu when you run it manually!
    inputs:
      job_target:
        description: 'Which script do you want to run?'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'brain_only'
          - 'scraper_only'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 supabase pytz lxml yfinance
          
      - name: Run Scrapers
        # Only runs if it's a scheduled run, OR if you selected 'all' or 'scraper_only'
        if: ${{ github.event_name == 'schedule' || github.event.inputs.job_target == 'all' || github.event.inputs.job_target == 'scraper_only' }}
        run: python scraper_main.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          
      - name: Run Institutional Brain Engine
        # Only runs if it's a scheduled run, OR if you selected 'all' or 'brain_only'
        if: ${{ github.event_name == 'schedule' || github.event.inputs.job_target == 'all' || github.event.inputs.job_target == 'brain_only' }}
        run: python brain.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}