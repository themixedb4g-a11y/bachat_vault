name: Bachat Vault Master Sync

on:
  schedule:
    # Runs at 7:14 AM, 5:14 PM, 7:14 PM, and 9:14 PM PKT (UTC+5)
    # Using minute 14 to bypass GitHub Actions top-of-the-hour server limits
    - cron: '14 2,12,14,16 * * *' 
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # ADDED yfinance HERE!
          pip install pandas requests beautifulsoup4 supabase pytz lxml yfinance
          
      - name: Run Scrapers
        run: python scraper_main.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          
      - name: Run Institutional Brain Engine
        run: python brain.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}