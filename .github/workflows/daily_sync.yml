on:
  schedule:
    # 1. 2-Hourly Funds (MUFAP/UBL) - Runs every 2 hours
    - cron: '0 */2 * * *' 
    
    # 2. Market Data - 8 AM and 5 PM PST (03:00 & 12:00 UTC)
    - cron: '0 3,12 * * *'

  workflow_dispatch: 

jobs:
  sync_and_calculate:
    runs-on: ubuntu-latest
    # THIS IS THE MISSING PIECE:
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Python Scraper
        run: python scraper_main.py  # <-- Change this to your actual scraping script name

      - name: Run Brain
        run: python brain.py

      # ... (the rest of your steps stay the same)
